name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Casa com global.json (.NET 10 LTS).
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  # Sobe o app de verdade (Postgres + migration + seed) e faz um smoke test HTTP.
  smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: algarage
          POSTGRES_USER: algarage
          POSTGRES_PASSWORD: algarage
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U algarage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ConnectionStrings__Default: "Host=localhost;Port=5432;Database=algarage;Username=algarage;Password=algarage"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://localhost:8080"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef

      - name: Generate initial migration
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations add InitialCreate \
            -p src/ALGarage.Infrastructure -s src/ALGarage.Web

      - name: Build
        run: dotnet build --configuration Release

      - name: Boot app + smoke test (migrate, seed, serve)
        run: |
          set -e
          dotnet run --project src/ALGarage.Web -c Release --no-build > /tmp/app.log 2>&1 &
          APP_PID=$!
          ok=0
          for i in $(seq 1 40); do
            code=$(curl -s -o /tmp/home.html -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 2
          done
          echo "=== app.log (tail) ==="; tail -n 50 /tmp/app.log || true
          if [ "$ok" != "1" ]; then echo "::error::App não respondeu 200 na home"; exit 1; fi
          echo "Home: 200 OK"
          grep -q "LGarage" /tmp/home.html && echo "Home contém a marca ÄLGarage"
          reg=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/account/register)
          echo "register: $reg"
          [ "$reg" = "200" ] || { echo "::error::/account/register não retornou 200"; exit 1; }
          # /garagem exige login → deve redirecionar (302/200 após redirect)
          gar=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/garagem)
          echo "garagem (sem login): $gar"
          kill $APP_PID 2>/dev/null || true
          echo "SMOKE OK"

      - name: Upload migration verificada na CI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ef-migration
          path: src/ALGarage.Infrastructure/Migrations/
          if-no-files-found: warn
